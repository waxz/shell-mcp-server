name: cross-platform

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Clone docker-files repo
        run: git clone https://github.com/waxz/docker-files.git docker

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Automatically creates and adds .venv to PATH
          activate-environment: true
          enable-cache: true

      - name: Install project
        run: |
          uv pip install .

      - name: Setup Docker Engine
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true
            }

      - name: Set up Docker Compose environment (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "DOCKER_SHELL_COMPOSE_FILE_OVERRIDE=${{ github.workspace }}/docker/docker-compose.yml" >> $GITHUB_ENV
          export DOCKER_SHELL_COMPOSE_FILE_OVERRIDE="${{ github.workspace }}/docker/docker-compose.yml"
          source ./docker/setup-profile-env.sh
          drun pwd
          drun_rm

          python test.py --report report-${{ matrix.os }}.txt

      - name: Set up Docker Compose environment (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
            # Set environment variable in current session AND for future steps
          $env:DOCKER_SHELL_COMPOSE_FILE_OVERRIDE = "${{ github.workspace }}/docker/docker-compose.yml"
          echo "DOCKER_SHELL_COMPOSE_FILE_OVERRIDE=${{ github.workspace }}/docker/docker-compose.yml" >> $env:GITHUB_ENV
          
          . ${{ github.workspace }}/docker/setup-profile-env.ps1
          drun pwd
          drun_rm

          python test.py --report report-${{ matrix.os }}.txt

