name: cross-platform

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:


jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Clone docker-files repo
        run: git clone https://github.com/waxz/docker-files.git docker

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Set up Docker
        uses: docker/setup-docker@v4


      - name: Set up Docker Compose environment (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "DOCKER_SHELL_COMPOSE_FILE_DEFAULT=${{ github.workspace }}/docker/docker-compose.yml" >> $GITHUB_ENV
          echo "DOCKER_SHELL_SERVICE_DEFAULT=drun" >> $GITHUB_ENV
          echo "DOCKER_SANDBOX_WORKDIR_DEFAULT=/app/dev/repo" >> $GITHUB_ENV
          echo "DOCKER_SANDBOX_HOST_ROOT_DEFAULT=${{ github.workspace }}/app" >> $GITHUB_ENV

          ./docker/setup-profile.sh

      - name: Set up Docker Compose environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "DOCKER_SHELL_COMPOSE_FILE_DEFAULT=${{ github.workspace }}\docker\docker-compose.yml" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "DOCKER_SHELL_SERVICE_DEFAULT=drun" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "DOCKER_SANDBOX_WORKDIR_DEFAULT=/app/dev/repo" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "DOCKER_SANDBOX_HOST_ROOT_DEFAULT=${{ github.workspace }}\app" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          powershell -File ./docker/setup-profile.ps1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Automatically creates and adds .venv to PATH
          activate-environment: true
          enable-cache: true

      - name: Install project
        run: |
          uv pip install  .

      - name: Run MCP direct test runner
        run: python test.py --report report-${{ matrix.os }}.txt
