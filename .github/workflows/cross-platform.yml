name: cross-platform

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # FIX: Use v4
      - uses: actions/checkout@v4

      - name: Clone docker-files repo
        run: git clone https://github.com/waxz/docker-files.git docker

      # FIX: Use v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Setup Docker Engine
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true
            }

      - name: Set up Docker Compose environment (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "DOCKER_SHELL_COMPOSE_FILE_OVERRIDE=${{ github.workspace }}/docker/docker-compose.yml" >> $GITHUB_ENV
          
          chmod +x ./docker/setup-profile.sh
          ./docker/setup-profile.sh

      - name: Set up Docker Compose environment (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # FIX: Cleaner variable injection for Windows
          echo "DOCKER_SHELL_COMPOSE_FILE_OVERRIDE=${{ github.workspace }}\docker\docker-compose.yml" >> $env:GITHUB_ENV

          powershell -File ./docker/setup-profile.ps1

      # FIX: Use v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          activate-environment: true
          enable-cache: true

      - name: Install project
        run: |
          uv pip install .

      - name: Run Test with Docker Function
        run: |
          # On Linux, you must source the script again to get the functions
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            source ./docker/setup-profile-env.sh
          else
            # On Windows (pwsh), dot-source to load the functions
            . ./docker/setup-profile-env.ps1
          fi
            drun python test.py --report report-${{ matrix.os }}.txt

